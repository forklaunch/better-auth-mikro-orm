name: Release

on:
  push:
    branches:
      - main

concurrency: ${{github.workflow}}-${{github.ref}}

jobs:
  release:
    name: Release
    runs-on: ubuntu-22.04

    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits. The action will fail if I remove this.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        id: pnpm-install
        uses: pnpm/action-setup@v4.2.0
        with:
          cache: true
          run_install: |
            - args: [--frozen-lockfile]

      - name: Create a Pull Request for a new release
        id: changesets
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          NPM_TOKEN: ${{secrets.NPM_TOKEN}}
        uses: changesets/action@v1
        with:
          title: Next release
          commit: Bump version
          publish: pnpm release
          version: pnpm changeset version
